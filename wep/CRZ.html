<!DOCTYPE html>
<html lang="es">
<head>
   <meta charset="UFT-8">
   <meta name="viewport" content="width=device-width,
   initial-scale=1.0">
   <title>Mensaje de Amor</title>

   <style>
    body {
        background: linear-gradient(to right, #ff758c, #ff7eb3);
        display: flex;
        justify-content: center;
        align-items: center;
        heigth: 100vh;
        margin:0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        }

        .mensaje {
            color: white;
            font-size: 2em;
            border-right: 3px solid white;
            white-space: nowrap;
            overflow:hidden;
            width:0;
            animation: escribir 5s steps(40) forwards,
                  parpadeo 0.7s infinite;
        }

        @keyframes escribir {
            from {width:0;}
            to {width:100%;}
        }

        @keyframes parpadeo {
            50% {border-color: transparent;}
        }

        .corazon {
            position: absolute;
            color: blue;
            font-size:30px;
            animation: subir 5s linear infinite;
        }

        @keyframes subir {
            from {
                transform: translateY(100vh);
                opacity:1;
            }
            to {
                transform: translateY(-100vh);
                opacity:0;
            }
        }
    </style>
</head>
<body>
    <div class="mensaje">
         💖 Eres la Mejor 💖  
    </dv>

</body>
</html>
